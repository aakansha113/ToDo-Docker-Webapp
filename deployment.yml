apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: todo-app

  template:
    metadata:
      labels:
        app: todo-app

    spec:
      containers:
        - name: todo-container
          image: aakansha113/todo-app:v1

          ports:
            - containerPort: 80

          env:
            - name: APP_MODE
              valueFrom:
                configMapKeyRef:
                  name: todo-config
                  key: APP_MODE

            - name: APP_COLOR
              valueFrom:
                configMapKeyRef:
                  name: todo-config
                  key: APP_COLOR

            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: todo-secret
                  key: DB_USER

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: todo-secret
                  key: DB_PASSWORD

          resources:
            requests:
              memory: "64Mi"
              cpu: "250m"
            limits:
              memory: "128Mi"
              cpu: "500m"




